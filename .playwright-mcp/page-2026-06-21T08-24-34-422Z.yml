        - heading "Rethinking Metabolic Health" [level=2] [ref=e41]
        - paragraph [ref=e44]: Aardvark Therapeutics is a clinical-stage biopharmaceutical company developing novel, small-molecule therapies designed to inhibit hunger and treat metabolic diseases.
        - link "Contact Us" [ref=e48] [cursor=pointer]:
          - /url: /contact/
          - generic [ref=e50]: Contact Us
      - generic [ref=e58]:
        - heading "Hunger & Appetite are Wired Differently" [level=2] [ref=e61]:
          - text: Hunger & Appetite are
          - text: Wired Differently
        - generic [ref=e63]:
          - paragraph [ref=e64]: Hunger and appetite are distinct neurologic drives that influence a person’s behavior toward food consumption. Appetite reflects desire for reward or pleasure whereas hunger is driven by the need to avoid pain and discomfort. Although these perceptions interact neurologically in complementary ways, they remain unique and distinguishable processes.
          - paragraph [ref=e65]: Aardvark is focused on alleviating hunger to treat metabolic diseases and delivering transformative outcomes for patients.
        - link "Learn More" [ref=e69] [cursor=pointer]:
          - /url: /science/
          - generic [ref=e71]: Learn More
      - generic [ref=e78]:
        - heading "ARD-101" [level=2] [ref=e81]
        - paragraph [ref=e84]: Our lead compound, ARD-101, is an oral investigational drug being developed for the treatment of hunger-associated rare diseases. ARD-101 is primarily limited to the digestive tract, where it activates bitter taste receptors (TAS2Rs) to trigger the local release of satiety hormones to activate gut-brain signals that suppress hunger.
      - generic [ref=e86]:
        - heading "Unlocking Opportunities in Obesity" [level=2] [ref=e89]
        - paragraph [ref=e92]: Our goal is to become a leader in the treatment of hunger, which has potential applications in the treatment of hyperphagia in rare diseases as well as obesity and obesity-related conditions.
