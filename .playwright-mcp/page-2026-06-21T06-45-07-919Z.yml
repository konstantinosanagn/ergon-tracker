          - heading "Cookie Preferences" [level=2] [ref=e278]
          - generic [ref=e279]: By clicking “Accept All Cookies”, you agree to the storing of cookies and similar technologies on your device to enhance site navigation, analyze site usage, offer certain functionalities and assist in our marketing efforts. Strictly necessary cookies are always active. You can also manage your cookie choices individually by clicking on "Cookies Settings". Various cookies may be set by third party providers located in the US. By agreeing to such cookies, you also consent to the transfer of your data to the US acc. to Art. 49 (1) a EU GDPR. Please note that although Linde takes measures to protect your data in case of such a transfer, the US recipient may not be able to provide protection which is essentially equivalent to the level of protection in the EU/EEA/Switzerland due to peculiarities of US law. In particular, access to data by US authorities may be possible and more extensive than in the EU and non-US nationals may not have effective legal remedies against such access.
