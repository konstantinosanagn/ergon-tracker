          - heading "# Building different" [level=1] [ref=e24]
          - generic [ref=e26]:
            - paragraph [ref=e27]: Shopify is where contradictions create magic. We move with startup speed, but we’ve been around for a minute. We're technical to our core and human in our approach. We're deeply serious and seriously playful, because we know that's how the best work gets done.
            - paragraph [ref=e28]: We give a shit and get shit done. We obsess over problems, and build out loud. We build in hard mode. From the founder in the code to the engineers who move like entrepreneurs. Hack it, break it, make it better. It’s about high agency in high ambiguity. Often starting scrappy, but always shipping polished.
            - paragraph [ref=e29]: This environment transforms people. We raise the floor, while we constantly redefine the ceiling. The bar is high and the pace is fast, but nobody climbs alone. That's how we create extraordinary products for our merchants. That’s how we make commerce better for everyone.
            - paragraph [ref=e30]:
              - text: Ready to join? Let's go.
              - text: Already built something the world knows? Skip the line.
