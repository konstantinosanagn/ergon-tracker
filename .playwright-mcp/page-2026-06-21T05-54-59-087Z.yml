        - generic [ref=e70]:
          - heading "Where we hire" [level=2] [ref=e71]
          - generic [ref=e72]:
            - paragraph [ref=e73]: It's not where you sit, it's where you ship
            - generic [ref=e75]:
              - text: The way we work is "Digital by Design". We do our daily work wherever we work best, and drop in to one of our Port offices whenever we feel like it. Our Ports are kinda like clubhouses for Shopifolk. Whether it's Toronto, Ottawa, Montréal, New York, or Bellevue, drop in whenever you're in town.
              - text: We also come together when it's obvious we need to connect. That might be big link ups in big numbers like Shopify's annual Summit in Toronto, where thousands of Shopifolk connect with each other, and our mission. It also might be Hack Days at a Port where we prototype, build, and ship fast.
              - text: "Or maybe it's a few days IRL (what we call: Bursts) to solve gnarly problems that can only be tackled in person. Travel happens about 3x a year, starting with Startup Connections (aka in-person onboarding with your new cohort), Shopify Summit, and at least one Burst."
              - text: Our culture is built on trust, not location. We hire exceptional people wherever they are, then let them cook.
      - generic [ref=e76]:
        - generic [ref=e77]:
          - heading "Who we hire" [level=2] [ref=e78]
          - generic [ref=e79]:
            - paragraph [ref=e80]: The persistently curious
            - paragraph [ref=e82]: Shopify has a unique personality. We hire builders with the same entrepreneurial spirit as the merchants we serve. Master crafters who know what great looks like. People who keep their identities lightweight. Who ship fast, communicate clearly, and leave things better than they found them. If you're energized by new challenges and measure success by growth - not comfort, then read on.
        - generic [ref=e84]:
          - generic [ref=e85]:
            - heading "Accept our mission" [level=3] [ref=e86]:
              - generic [ref=e87]: Accept our mission
            - paragraph [ref=e88]: Commerce is a powerful expression of free speech. We use it to cast a vote with every product we buy. You need to care deeply about your work towards our mission to make commerce better for everyone not just those you agree with.
          - generic [ref=e89]:
            - heading "Thrive on change" [level=3] [ref=e90]:
              - generic [ref=e91]: Thrive on change
            - paragraph [ref=e92]: We’re building products for the long-term to make Shopify a forever company, and that requires an unrelenting pace (the week, not the quarter) and an ability to thrive in an unpredictable environment. You need to be resilient to navigate ambiguity.
          - generic [ref=e93]:
            - heading "Chase excellence" [level=3] [ref=e94]:
              - generic [ref=e95]: Chase excellence
            - paragraph [ref=e96]: Joining our team means working with the most driven crafters who pursue mastery. But growth isn’t just an opportunity, it’s an expectation. With resources to help you, you’ll be pushing yourself out of your comfort zone.
